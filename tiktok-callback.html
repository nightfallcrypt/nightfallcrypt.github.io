<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>TikTok Authorization — Nightfall Crypt</title>
  <link href="styles.css" rel="stylesheet"/>
  <link href="images/profile.jpg" rel="icon" type="image/jpeg"/>
 </head>
 <body>
  <nav class="nav">
   <div class="nav-inner">
    <a class="nav-logo" href="index.html">Nightfall Crypt</a>
    <ul class="nav-links">
     <li><a href="index.html">Home</a></li>
     <li><a href="stories.html">Stories</a></li>
     <li><a href="about.html">About</a></li>
     <li><a href="contact.html">Contact</a></li>
    </ul>
   </div>
  </nav>
  <div class="page-header">
   <h1>TikTok Authorization</h1>
   <p>Copy the code below and paste it into the terminal.</p>
  </div>
  <section class="section">
   <div class="container">
    <div class="about-body" style="text-align:center">
     <div id="status"></div>
     <div id="code-box" style="display:none;margin-top:32px">
      <p style="color:var(--text-muted);margin-bottom:16px">Your authorization code:</p>
      <code id="code-value" style="display:block;background:var(--bg2);border:1px solid var(--border);padding:20px 24px;border-radius:4px;font-size:0.85rem;word-break:break-all;color:var(--accent-bright);letter-spacing:0.04em"></code>
      <button onclick="copyCode()" style="margin-top:20px;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-family:var(--font-heading);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer">Copy Code</button>
      <p id="copy-msg" style="color:var(--accent-bright);margin-top:12px;display:none">Copied!</p>
     </div>
     <div id="error-box" style="display:none;margin-top:32px;color:var(--accent-bright)"></div>
    </div>
   </div>
  </section>
  <footer class="footer">
   <div class="container">
    <p class="footer-logo">Nightfall Crypt</p>
    <p class="footer-copy">&copy; 2026 Nightfall Crypt. All rights reserved.</p>
   </div>
  </footer>
  <script>
   (function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var error = params.get('error');
    if (code) {
     document.getElementById('code-value').textContent = code;
     document.getElementById('code-box').style.display = 'block';
     document.getElementById('status').textContent = 'Authorization successful.';
    } else if (error) {
     document.getElementById('error-box').textContent = 'Authorization failed: ' + error;
     document.getElementById('error-box').style.display = 'block';
     document.getElementById('status').textContent = 'Something went wrong.';
    } else {
     document.getElementById('status').textContent = 'No authorization code found in URL.';
    }
   })();
   function copyCode() {
    var code = document.getElementById('code-value').textContent;
    navigator.clipboard.writeText(code).then(function () {
     document.getElementById('copy-msg').style.display = 'block';
    });
   }
  </script>
 </body>
</html>
